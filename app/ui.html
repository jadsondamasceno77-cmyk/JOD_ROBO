<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JOD EXECUTOR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000000; color: #00ff41; font-family: "Courier New", monospace; padding: 40px; }
h1 { color: #ffd700; font-size: 2rem; margin-bottom: 8px; letter-spacing: 3px; }
.sub { color: #888; font-size: 0.85rem; margin-bottom: 30px; }
textarea { width: 100%; background: #000; color: #ffffff; border: 2px solid #00ff41;
  padding: 16px; font-family: "Courier New", monospace; font-size: 1.1rem;
  resize: vertical; min-height: 80px; outline: none; border-radius: 4px; }
textarea::placeholder { color: #555; }
button { margin-top: 16px; background: #ffd700; color: #000000; border: none;
  padding: 14px 36px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
  font-family: "Courier New", monospace; border-radius: 4px; letter-spacing: 2px; }
button:hover { background: #ffffff; }
button:disabled { background: #333; color: #666; cursor: not-allowed; }
#output { margin-top: 24px; background: #000; border: 2px solid #333;
  padding: 24px; min-height: 120px; white-space: pre-wrap; line-height: 1.8;
  border-radius: 4px; font-size: 1rem; }
.line-ok   { color: #00ff41; font-weight: bold; }
.line-err  { color: #ff3333; font-weight: bold; }
.line-info { color: #ffd700; font-weight: bold; }
.line-text { color: #ffffff; }
.line-dim  { color: #aaaaaa; }
#status { margin-top: 10px; font-size: 0.85rem; color: #666; }
</style>
</head>
<body>
<h1>⚡ JOD EXECUTOR</h1>
<p class="sub">Comandos: "cria agents/nome.py com..." | "oi" | "explique X" | "gera scripts/nome.py que..."</p>
<textarea id="task" placeholder="Digite sua tarefa ou pergunta..."></textarea>
<br>
<button id="btn" onclick="executar()">▶ EXECUTAR</button>
<div id="status"></div>
<div id="output"></div>

<script>
async function executar() {
  const task = document.getElementById("task").value.trim();
  if (!task) return;
  const btn = document.getElementById("btn");
  const output = document.getElementById("output");
  const status = document.getElementById("status");
  btn.disabled = true;
  btn.textContent = "⏳ EXECUTANDO...";
  output.innerHTML = "<div class='line-dim'>Aguardando JOD...</div>";
  status.textContent = "";

  try {
    const res = await fetch("/execute", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({task})
    });
    const data = await res.json();
    const raw = data.output || data.error || "Sem resposta";
    const mode = data.mode || "conversa";

    if (mode === "conversa") {
      output.innerHTML = `<div class="line-text">${raw.replace(/\n/g, "<br>")}</div>`;
    } else {
      const lines = raw.split("\n");
      let html = "";
      for (const line of lines) {
        const t = line.trim();
        if (!t) continue;
        if (t.startsWith("{") && t.includes('"level"')) continue;
        if (t.startsWith("✓") || t.startsWith("✅")) html += `<div class="line-ok">${t}</div>`;
        else if (t.startsWith("✗") || t.startsWith("❌")) html += `<div class="line-err">${t}</div>`;
        else if (t.startsWith("===") || t.startsWith("📋") || t.startsWith("📤")) html += `<div class="line-info">${t}</div>`;
        else html += `<div class="line-dim">${t}</div>`;
      }
      output.innerHTML = html || "Concluído.";
    }
    status.textContent = "Pronto.";
  } catch(e) {
    output.innerHTML = `<div class="line-err">Erro: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = "▶ EXECUTAR";
}

document.getElementById("task").addEventListener("keydown", e => {
  if (e.ctrlKey && e.key === "Enter") executar();
});
</script>
</body>
</html>
