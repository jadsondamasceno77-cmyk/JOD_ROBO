<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JOD EXECUTOR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #00ff41; font-family: "Courier New", monospace; padding: 40px; }
h1 { color: #c5a059; font-size: 2rem; margin-bottom: 8px; }
.sub { color: #555; font-size: 0.85rem; margin-bottom: 30px; }
textarea { width: 100%; background: #0f0f0f; color: #00ff41; border: 1px solid #00ff41;
  padding: 16px; font-family: "Courier New", monospace; font-size: 1rem;
  resize: vertical; min-height: 80px; outline: none; border-radius: 4px; }
button { margin-top: 16px; background: #c5a059; color: #000; border: none;
  padding: 14px 32px; font-size: 1rem; font-weight: bold; cursor: pointer;
  font-family: "Courier New", monospace; border-radius: 4px; }
button:hover { background: #e6b86a; }
button:disabled { background: #555; cursor: not-allowed; }
#output { margin-top: 24px; background: #0f0f0f; border: 1px solid #1a1a1a;
  padding: 20px; min-height: 100px; white-space: pre-wrap; line-height: 1.6;
  border-radius: 4px; font-size: 0.9rem; }
.line-ok { color: #00ff41; }
.line-err { color: #ff4444; }
.line-info { color: #c5a059; }
.line-dim { color: #444; }
#status { margin-top: 12px; font-size: 0.85rem; color: #555; }
</style>
</head>
<body>
<h1>⚡ JOD EXECUTOR</h1>
<p class="sub">Comandos: "cria agents/nome.py com..." | "gera scripts/nome.py que..."</p>
<textarea id="task" placeholder="Digite sua tarefa..."></textarea>
<br>
<button id="btn" onclick="executar()">▶ EXECUTAR</button>
<div id="status"></div>
<div id="output"></div>

<script>
async function executar() {
  const task = document.getElementById("task").value.trim();
  if (!task) return;
  const btn = document.getElementById("btn");
  const output = document.getElementById("output");
  const status = document.getElementById("status");
  btn.disabled = true;
  btn.textContent = "⏳ EXECUTANDO...";
  output.innerHTML = "";
  status.textContent = "Aguarde...";

  try {
    const res = await fetch("/execute", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({task})
    });
    const data = await res.json();
    const raw = data.output || data.error || "Sem resposta";

    // Filtra linhas — remove JSON de log
    const lines = raw.split("\n");
    let html = "";
    for (const line of lines) {
      const t = line.trim();
      if (!t) continue;
      if (t.startsWith("{") && t.includes('"level"')) continue; // remove logs JSON
      if (t.startsWith("✓")) html += `<div class="line-ok">${t}</div>`;
      else if (t.startsWith("✗") || t.startsWith("❌")) html += `<div class="line-err">${t}</div>`;
      else if (t.startsWith("===") || t.startsWith("✅")) html += `<div class="line-info">${t}</div>`;
      else html += `<div class="line-dim">${t}</div>`;
    }
    output.innerHTML = html || "Concluído.";
    status.textContent = "Pronto.";
  } catch(e) {
    output.innerHTML = `<div class="line-err">Erro: ${e.message}</div>`;
    status.textContent = "Erro.";
  }

  btn.disabled = false;
  btn.textContent = "▶ EXECUTAR";
}

document.getElementById("task").addEventListener("keydown", e => {
  if (e.ctrlKey && e.key === "Enter") executar();
});
</script>
</body>
</html>
