<!DOCTYPE html><html><head><title>JOD EXECUTOR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#00ff41;font-family:monospace;padding:2rem}
h1{color:#c5a059;margin-bottom:.5rem;font-size:1.5rem}
p{color:#555;font-size:11px;margin-bottom:1rem}
input{background:#111;color:#00ff41;border:1px solid #444;padding:.8rem;width:100%;font-family:monospace;font-size:14px;display:block;outline:none}
input:focus{border-color:#c5a059}
button{background:#c5a059;color:#000;border:none;padding:.7rem 2rem;cursor:pointer;font-weight:bold;font-size:14px;margin-top:.5rem;display:block}
button:disabled{background:#555;cursor:not-allowed}
#out{background:#111;border:1px solid #222;padding:1rem;min-height:200px;white-space:pre-wrap;margin-top:1rem;font-size:12px;overflow-y:auto;max-height:55vh;color:#00ff41}
.ok{color:#00ff41}.err{color:#ff4444}.wait{color:#c5a059}
</style></head><body>
<h1>⚡ JOD EXECUTOR</h1>
<p>Comandos: "cria agents/nome.py com..." | "gera scripts/nome.py que..."</p>
<input id="t" placeholder="Digite o comando e pressione Enter..." autofocus>
<button id="btn" onclick="run()">▶ EXECUTAR</button>
<div id="out" class="wait">Pronto. Aguardando comando...</div>
<script>
var running=false;
function run(){
  if(running)return;
  var t=document.getElementById("t").value.trim();
  if(!t)return;
  running=true;
  var btn=document.getElementById("btn");
  var out=document.getElementById("out");
  btn.disabled=true;
  btn.textContent="⏳ Executando...";
  out.className="wait";
  out.textContent="▶ Executando: "+t+"\n\nAguarde...";
  fetch("/execute",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({task:t})})
  .then(function(r){return r.json();})
  .then(function(d){
    out.textContent=d.output||d.error||"Sem resposta";
    out.className=d.output&&d.output.includes("Concluído")?"ok":"err";
    btn.disabled=false;
    btn.textContent="▶ EXECUTAR";
    running=false;
  })
  .catch(function(e){
    out.textContent="Erro de conexão: "+e;
    out.className="err";
    btn.disabled=false;
    btn.textContent="▶ EXECUTAR";
    running=false;
  });
}
document.getElementById("t").onkeydown=function(e){
  if(e.key==="Enter"){e.preventDefault();run();}
};
</script></body></html>
