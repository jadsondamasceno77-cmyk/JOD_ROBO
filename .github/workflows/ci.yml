name: CI

on:
  push:
    branches: ["main", "master", "develop", "padrão"]
  pull_request:
    branches: ["main", "master", "padrão"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff --quiet
          ruff check main_fase2.py --select E,F,W --ignore E501,W503 || true

      - name: Start server
        run: |
          JOD_ENV=test python3 main_fase2.py >> uvicorn.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 30); do
            sleep 1
            if curl -sf http://127.0.0.1:37777/health/live > /dev/null 2>&1; then
              echo "Server UP após ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server não subiu em 30s — log abaixo:"
              cat uvicorn.log || true
              exit 1
            fi
          done
        env:
          JOD_ENV: test

      - name: Verify server before tests
        run: |
          echo "=== Server health check antes dos testes ==="
          curl -sf http://127.0.0.1:37777/health/live || \
            (echo "SERVER DOWN antes dos testes!"; cat uvicorn.log; exit 1)
          echo "Server UP confirmado"

      - name: Run all tests
        run: |
          JOD_ENV=test python3 -m pytest \
            tests/test_finalizer.py \
            tests/test_guardian.py \
            tests/test_integration.py \
            tests/test_b1_stale_attestation.py \
            tests/test_b1_2_guardian_veto_e2e.py \
            tests/test_b2_serialization_and_logs.py \
            tests/test_security.py \
            tests/test_io.py \
            tests/test_robo_mae.py \
            tests/test_chaos.py \
            tests/test_recovery.py \
            tests/test_memory.py \
            tests/test_watchdog.py \
            -v --tb=long --junit-xml=test-results.xml 2>&1 | tee /tmp/pytest_output.txt
          exit ${PIPESTATUS[0]}
        env:
          JOD_ENV: test

      - name: Summarize failures
        if: always()
        run: |
          python3 - <<'EOF'
          import os, xml.etree.ElementTree as ET
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          try:
              root = ET.parse("test-results.xml").getroot()
              failures = []
              for tc in root.iter("testcase"):
                  for tag in ("failure", "error"):
                      node = tc.find(tag)
                      if node is not None:
                          name = f"{tc.get('classname','')}.{tc.get('name','')}"
                          msg = (node.get("message","") or node.text or "")[:400]
                          failures.append(f"- **{name}**: {msg}")
              with open(summary, "a") as f:
                  if failures:
                      f.write("## Failed tests\n" + "\n".join(failures) + "\n")
                  else:
                      f.write("## No test failures in XML\n")
          except Exception as e:
              with open(summary, "a") as f:
                  f.write(f"## Could not parse XML: {e}\n")
          EOF

      - name: Dump server log
        if: always()
        run: cat uvicorn.log || true

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) 2>/dev/null || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 30
