version: "3.9"
networks:
  jod-net:
    driver: bridge
volumes:
  redis-data:
  ollama-data:
services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass jodrobo2026 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - jod-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "jodrobo2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - jod-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "37777:37777"
    env_file: .env
    environment:
      - REDIS_URL=redis://:jodrobo2026@redis:6379
      - OLLAMA_HOST=http://ollama:11434
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./scripts:/app/scripts
      - ./agents:/app/agents
      - ./.jod_memory.json:/app/.jod_memory.json
      - ~/.ssh:/root/.ssh:ro
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - jod-net
    restart: unless-stopped
