services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./app:/app
      - /mnt/c/JOD_TOOLS/PROJETO_JOD:/google
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GOOGLE_DIR=/google
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: >
      bash -lc "
      pip install --no-cache-dir fastapi uvicorn redis google-auth google-auth-oauthlib google-api-python-client &&
      uvicorn main:app --host 0.0.0.0 --port 8000
      "

