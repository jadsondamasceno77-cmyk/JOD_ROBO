version: "3.9"
# ─── 10 Robôs Mãe rodando LOCALMENTE esta noite ──────────────────────────────
# Sem Oracle, sem cloud — roda agora no seu servidor

services:

  postgres:
    image: postgres:15-alpine
    container_name: jod_postgres
    restart: always
    environment:
      POSTGRES_DB: jod_robo
      POSTGRES_USER: jod
      POSTGRES_PASSWORD: jod_secure_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jod"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jod_redis
    restart: always
    volumes:
      - redis_data:/data

  # ── MAE-001: Fitness / Brasil ─────────────────────────────────────────────
  mae_001:
    image: python:3.10-slim
    container_name: jod_mae_001
    restart: always
    working_dir: /app
    volumes:
      - .:/app
      - ./sessions/mae-001:/app/sessions
    environment:
      - INSTANCE_ID=mae-001
      - NICHE=fitness
      - COUNTRY=BR
      - LANG=pt-BR
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JOD_TRUST_MANIFEST=jod_robo_trust_2026_secure
      - ELI_URL=http://jod_eli:37779
      - REDIS_URL=redis://jod_redis:6379
      - MAX_WORKERS=5
    command: >
      sh -c "pip install -q instagrapi httpx apscheduler &&
             python3 instagram_worker.py"
    depends_on: [redis]

  # ── MAE-002: Yoga / India ─────────────────────────────────────────────────
